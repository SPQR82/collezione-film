<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Collezione Film</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Collezione Film</h1>

    <div class="filters">
        <button class="filter-btn" data-format="Tutti">Tutti</button>
        <button class="filter-btn" data-format="DVD">DVD</button>
        <button class="filter-btn" data-format="Blu-Ray">Blu‑ray</button>
    </div>

    <input type="text" id="search" placeholder="Cerca un film...">
</header>

<main>
    <ul id="film-list"></ul>
</main>

<script src="script.js"></script>
</body>
</html>
