<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Collezione Film</title>
    <link rel="stylesheet" href="style.css">

    <!-- Icone Formato (DVD / Blu-ray) -->
    <style>
        .icon-formato {
            height: 16px;       /* Dimensione perfetta accanto al testo */
            width: auto;
            vertical-align: middle;
            margin-right: 6px;
            opacity: 0.95;
        }
    </style>
</head>
<body>

<header></header>

<!-- MENU FILTRI -->
<nav id="menu">
    <button data-filter="all">Lista Completa</button>
    <button data-filter="bluray">Blu-Ray</button>
    <button data-filter="dvd">DVD</button>
</nav>

<!-- BARRA DI RICERCA -->
<div id="search-box">
    <input type="text" id="search-input" placeholder="Cerca per titolo, regista o genere...">
</div>

<!-- LISTA FILM -->
<main>
    <ul id="film-list"></ul>
</main>

<script src="script.js"></script>

<button id="back-to-top">↑ Torna su</button>

</body>
</html>
